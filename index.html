<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Card for Ana ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle at center, #1a2a6c, #0b1d2a);
    font-family: 'Poppins', sans-serif; overflow: hidden;
  }

  /* Sparkle Effect */
  .sparkle {
    position: absolute; width: 6px; height: 6px; background: gold;
    border-radius: 50%; pointer-events: none; z-index: 20;
  }

  .moon-container {
    position: absolute; top: 40px; right: 50px;
    filter: drop-shadow(0 0 15px gold);
    animation: moonPulse 4s ease-in-out infinite;
    font-size: 3rem;
  }

  .book { width: 320px; height: 420px; perspective: 1200px; cursor: pointer; z-index: 10; }
  .card {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .book.open .card { transform: rotateY(-180deg); }

  .page {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 15px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 25px; box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .front {
    background: #1e3c72; 
    background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1564115484-a4aaa88d5449?auto=format&fit=crop&w=400&q=80');
    background-size: cover; color: white; z-index: 2; border: 2px solid gold;
  }

  .back {
    background: #111; transform: rotateY(180deg);
    color: white; text-align: center; border: 1px solid gold;
  }

  .profile {
    width: 160px; height: 160px; border-radius: 50%;
    object-fit: cover; border: 4px solid gold; margin-bottom: 15px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    background-color: #222;
  }

  .name { color: gold; margin: 5px 0; font-size: 1.4rem; font-weight: 600; }
  .message { font-family: 'Dancing Script', cursive; font-size: 1.3rem; height: 80px; line-height: 1.4; }

  .btn-preview {
    margin-bottom: 20px; padding: 12px 30px; background: gold;
    border: none; border-radius: 30px; font-weight: bold;
    cursor: pointer; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    transition: 0.3s;
  }
  .btn-preview:hover { transform: scale(1.05); }

  /* Background elements */
  .balloon { position: absolute; bottom: -100px; width: 30px; height: 40px; border-radius: 50%; z-index: -1; animation: floatUp 10s linear infinite; }
  @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 0.8; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }
  @keyframes moonPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>
<body>

<button class="btn-preview" onclick="runPreview()">✨ Run Live Preview</button>

<div class="moon-container">🌙</div>

<div class="book" id="eidBook" onclick="toggleCard()">
  <div class="card">
    <div class="page front">
      <h1 style="text-shadow: 2px 2px 10px black; font-size: 2.5rem;">Eid Mubarak</h1>
      <p>Tap to open your surprise 💌</p>
    </div>
    
    <div class="page back">
      <img src="UWCvzwH.jpeg" class="profile" alt="Ananna Zahin">
      
      <h2 class="name">Ananna Zahin (Ana) 💫</h2>
      <p class="message" id="typewriter"></p>
      <div class="only" id="onlyText" style="opacity:0; color:gold; margin-top:10px; font-weight: bold;">💖 Only for Ana</div>
    </div>
  </div>
</div>

<audio id="openSound">
  <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<script>
const book = document.getElementById('eidBook');
const sound = document.getElementById('openSound');
const textElement = document.getElementById('typewriter');
const msg = "Wishing you endless joy, peace, and beautiful moments this Eid ✨";
let isTyping = false;

function createSparkles() {
  for(let i=0; i<35; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const rect = book.getBoundingClientRect();
    s.style.left = (rect.left + rect.width / 2) + 'px';
    s.style.top = (rect.top + rect.height / 2) + 'px';
    
    const vx = (Math.random() - 0.5) * 25;
    const vy = (Math.random() - 0.5) * 25;
    document.body.appendChild(s);
    
    let op = 1;
    let x = rect.left + rect.width / 2;
    let y = rect.top + rect.height / 2;

    const anim = setInterval(() => {
      x += vx; y += vy; op -= 0.02;
      s.style.left = x + 'px'; s.style.top = y + 'px'; s.style.opacity = op;
      if(op <= 0) { clearInterval(anim); s.remove(); }
    }, 20);
  }
}

function typeWriter(text, i) {
  if (i < text.length) {
    textElement.innerHTML += text.charAt(i);
    setTimeout(() => typeWriter(text, i + 1), 50);
  } else {
    document.getElementById('onlyText').style.opacity = "1";
    document.getElementById('onlyText').style.transition = "1.5s opacity";
  }
}

function toggleCard() {
  const isOpen = book.classList.toggle('open');
  sound.currentTime = 0; sound.play();

  if (isOpen) {
    createSparkles();
    if(!isTyping) {
      isTyping = true;
      textElement.innerHTML = "";
      setTimeout(() => typeWriter(msg, 0), 1000);
    }
  } else {
    isTyping = false;
    textElement.innerHTML = "";
    document.getElementById('onlyText').style.opacity = "0";
  }
}

function runPreview() {
  book.classList.remove('open');
  isTyping = false;
  textElement.innerHTML = "";
  setTimeout(toggleCard, 500);
}

// Balloon Animation
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = Math.random() * 100 + 'vw';
  b.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 10000);
}, 2000);
</script>

</body>
</html>
